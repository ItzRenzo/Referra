name: Referra
version: '1.0'
main: me.itzrenzo.referra.Referra
api-version: '1.21'
load: STARTUP
authors: [ ItzRenzo ]
description: A referral system plugin for Minecraft servers
libraries:
  - com.zaxxer:HikariCP:5.1.0
  - com.mysql:mysql-connector-j:8.4.0
  - org.xerial:sqlite-jdbc:3.46.1.3

commands:
  referral:
    description: Main referral command
    usage: /referral [help|create|claim|top|admin|<referrer-ign>]
    aliases: [referra]
    permission: referral.use

permissions:
  referral.use:
    description: Allows players to use referral commands
    default: true
  referral.admin:
    description: Allows access to admin referral commands
    default: op
